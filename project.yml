name: OpenClaw
options:
  bundleIdPrefix: com.manasvardhan
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  OpenClaw:
    type: application
    platform: iOS
    sources:
      - OpenClaw
    resources:
      - path: OpenClaw/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.manasvardhan.openclaw
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_XR_DESIGNED_FOR: NO
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: OpenClaw/Resources/Info.plist
